<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 503 - Service Unavailable</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #edf4f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      display: flex;
      align-items: center;
      text-align: left;
      max-width: 600px;
      padding: 40px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .icon-wrapper {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      background-color: #e7f0f3;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .icon {
      font-size: 5.0rem;
      color: #6ca0b8;
      font-weight: bold;
    }
    .content {
      display: flex;
      flex-direction: column;
      margin-buttom: 30px;
    }
    h1 {
      font-size: 1.5rem;
      color: #0056b3;
      margin: 0 0 10px;
    }
    p {
      font-size: 1rem;
      color: #666;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <span class="icon">!</span>
    </div>
    <div class="content">
      <h1>Error 503. Service Unavailable</h1>
      <p>
        The server is temporarily unavailable. Please check back shortly. 
        If the problem persists, please contact our Technical Support department.
      </p>
    </div>
  </div>
</body>
</html>
